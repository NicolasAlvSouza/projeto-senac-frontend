<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Usuário</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Cadastro de Usuário</h1>
        <p>Crie um novo usuário para usar a API.</p>
    </header>

    <nav class="page-nav">
        <a class="button" href="index.html">Início</a>
        <a class="button" href="cadastro.html">Cadastro</a>
        <a class="button" href="login.html">Login</a>
        <a class="button" href="perfil.html">Perfil</a>
        <a class="button" href="tarefas.html">Tarefas</a>
    </nav>

    <div class="container">
        <section class="card instructions">
            <h2>Instruções</h2>
            <p>Preencha os dados do usuário e clique em <strong>Cadastrar</strong>. Depois, use a página de login para autenticar.</p>
        </section>
        <section class="card">
            <form id="form-cadastro">
                <div class="form-field">
                    <label for="cadastro-nome">Nome</label>
                    <input type="text" id="cadastro-nome" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-email">E-mail</label>
                    <input type="email" id="cadastro-email" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-telefone">Telefone</label>
                    <input type="tel" id="cadastro-telefone" required>
                </div>
                <div class="form-field">
                    <label for="cadastro-senha">Senha</label>
                    <input type="password" id="cadastro-senha" required>
                </div>
                <button type="submit">Cadastrar</button>
            </form>
            <div id="resultado"></div>
            <div class="links">
                <a href="index.html">Voltar</a>
                <a href="login.html">Já tenho conta</a>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/cadastro.js"></script>
</body>
</html>
