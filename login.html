<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Login</h1>
        <p>Entre para acessar suas tarefas.</p>
    </header>

    <nav class="page-nav">
        <a class="button" href="index.html">Início</a>
        <a class="button" href="cadastro.html">Cadastro</a>
        <a class="button" href="login.html">Login</a>
        <a class="button" href="perfil.html">Perfil</a>
        <a class="button" href="tarefas.html">Tarefas</a>
    </nav>

    <div class="container">
        <section class="card instructions">
            <h2>Instruções</h2>
            <p>Digite o e-mail e a senha do usuário cadastrado. O token JWT será salvo no navegador.</p>
        </section>
        <section class="card">
            <form id="form-login">
                <div class="form-field">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="form-field">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" required>
                </div>
                <button type="submit">Entrar</button>
            </form>
            <div id="resultado"></div>
            <div class="links">
                <a href="index.html">Voltar</a>
                <a href="cadastro.html">Criar conta</a>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
