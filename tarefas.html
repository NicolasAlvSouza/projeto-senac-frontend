<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhas Tarefas</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Minhas Tarefas</h1>
        <p>Gerencie suas tarefas depois de autenticar.</p>
    </header>

    <nav class="page-nav">
        <a class="button" href="index.html">Início</a>
        <a class="button" href="cadastro.html">Cadastro</a>
        <a class="button" href="login.html">Login</a>
        <a class="button" href="perfil.html">Perfil</a>
        <a class="button" href="tarefas.html">Tarefas</a>
    </nav>

    <div class="container">
        <section class="card instructions">
            <h2>Instruções</h2>
            <p>Se você estiver logado, suas tarefas serão carregadas automaticamente. Use o formulário abaixo para criar novas tarefas.</p>
        </section>
        <section class="card" id="perfil-card">
            <h2>Perfil</h2>
            <div id="perfil-info"></div>
            <button id="btn-logout" class="secondary">Sair</button>
        </section>

        <section class="card" id="tarefas-card">
            <h2>Cadastro de Tarefas</h2>
            <form id="form-tarefa">
                <div class="form-field">
                    <label for="tarefa-titulo">Título da tarefa</label>
                    <input type="text" id="tarefa-titulo" placeholder="Ex: Estudar Node" required>
                </div>
                <button type="submit">Criar tarefa</button>
            </form>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Título</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-tarefas"></tbody>
                </table>
            </div>
            <div id="resultado"></div>
            <div class="links">
                <a href="index.html">Voltar</a>
            </div>
        </section>
    </div>

    <script src="js/api.js"></script>
    <script src="js/tarefas.js"></script>
</body>
</html>
